<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mastery Ingestion Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --glass-bg: rgba(15, 23, 42, 0.8);
        --accent: #6366f1;
      }
      body {
        background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
        color: #f8fafc;
        font-family: "Inter", system-ui, sans-serif;
      }
      .chat-bubble {
        max-width: 80%;
        animation: slideIn 0.2s ease-out;
      }
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 10px;
      }
      .spreadsheet-cell {
        border-bottom: 1px solid #1e293b;
        border-right: 1px solid #1e293b;
        padding: 8px 12px;
        font-size: 0.75rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
    </style>
  </head>
  <body class="h-screen flex flex-col overflow-hidden">
    <!-- Header -->
    <header
      class="p-4 border-b border-slate-800 bg-slate-900/50 backdrop-blur-md flex justify-between items-center"
    >
      <div>
        <h1
          class="text-xl font-bold bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent"
        >
          Mastery Ingestion
        </h1>
        <p
          class="text-[10px] text-slate-500 uppercase tracking-widest font-semibold"
        >
          Node 04: Raw Data Capture
        </p>
      </div>
      <div class="flex gap-4 items-center">
        <span
          id="sync-status"
          class="text-[10px] text-emerald-500 flex items-center gap-1"
        >
          <span
            class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"
          ></span>
          LIVE SYNC
        </span>
      </div>
    </header>

    <!-- Main Workspace -->
    <main class="flex-1 flex overflow-hidden">
      <!-- Left Pane: Chat Interface -->
      <section class="w-full md:w-1/2 flex flex-col border-r border-slate-800">
        <div
          id="chat-window"
          class="flex-1 overflow-y-auto p-6 space-y-4 custom-scrollbar"
        >
          <!-- Messages injected here -->
          <div
            class="chat-bubble bg-slate-800 p-4 rounded-2xl rounded-bl-none border border-slate-700"
          >
            <p class="text-sm leading-relaxed">
              Spit your ideas here. I'll handle the structuring for your future
              self-mastery analysis.
            </p>
          </div>
        </div>

        <!-- Input Area -->
        <div class="p-4 bg-slate-900/80 border-t border-slate-800">
          <form id="ingest-form" class="relative">
            <input
              type="text"
              id="user-input"
              autocomplete="off"
              placeholder="Type an idea, mood, or observation..."
              class="w-full bg-slate-950 border border-slate-700 rounded-full py-3 px-6 pr-12 text-sm focus:outline-none focus:border-indigo-500 transition-all placeholder-slate-600"
            />
            <button
              type="submit"
              class="absolute right-2 top-1.5 p-2 text-indigo-400 hover:text-white transition"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5"
                viewBox="0 0 20 20"
                fill="currentColor"
              >
                <path
                  fill-rule="evenodd"
                  d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-8.707l-3-3a1 1 0 00-1.414 1.414L10.586 9H7a1 1 0 100 2h3.586l-1.293 1.293a1 1 0 101.414 1.414l3-3a1 1 0 000-1.414z"
                  clip-rule="evenodd"
                />
              </svg>
            </button>
          </form>
          <div class="mt-2 flex gap-2 overflow-x-auto pb-2 no-scrollbar">
            <span
              class="text-[9px] bg-slate-800 px-2 py-1 rounded border border-slate-700 text-slate-400 whitespace-nowrap"
              >#insight</span
            >
            <span
              class="text-[9px] bg-slate-800 px-2 py-1 rounded border border-slate-700 text-slate-400 whitespace-nowrap"
              >#habit</span
            >
            <span
              class="text-[9px] bg-slate-800 px-2 py-1 rounded border border-slate-700 text-slate-400 whitespace-nowrap"
              >#reflection</span
            >
          </div>
        </div>
      </section>

      <!-- Right Pane: Live Spreadsheet View (Desktop only) -->
      <section class="hidden md:flex md:w-1/2 flex-col bg-slate-950/50">
        <div
          class="p-3 border-b border-slate-800 bg-slate-900/30 flex justify-between items-center"
        >
          <span
            class="text-[10px] font-bold text-slate-400 uppercase tracking-widest"
            >Spreadsheet Preview</span
          >
          <span class="text-[10px] text-slate-600">mastery_data_v1.csv</span>
        </div>
        <div class="flex-1 overflow-auto custom-scrollbar">
          <table class="w-full text-left border-collapse">
            <thead
              class="sticky top-0 bg-slate-900 text-[10px] text-slate-500 uppercase"
            >
              <tr>
                <th class="spreadsheet-cell bg-slate-900">Timestamp</th>
                <th class="spreadsheet-cell bg-slate-900">Raw Input</th>
                <th class="spreadsheet-cell bg-slate-900">Category</th>
                <th class="spreadsheet-cell bg-slate-900">Sentiment</th>
              </tr>
            </thead>
            <tbody id="spreadsheet-body">
              <!-- Rows injected here -->
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <script>
      const form = document.getElementById("ingest-form");
      const input = document.getElementById("user-input");
      const chatWindow = document.getElementById("chat-window");
      const spreadsheetBody = document.getElementById("spreadsheet-body");

      const db = [];

      function analyzeSentiment(text) {
        const positive = [
          "good",
          "great",
          "happy",
          "win",
          "solved",
          "idea",
          "success",
        ];
        const negative = ["bad", "tired", "fail", "stress", "hard", "stuck"];

        const lower = text.toLowerCase();
        if (positive.some((word) => lower.includes(word))) return "Positive";
        if (negative.some((word) => lower.includes(word))) return "Tension";
        return "Neutral";
      }

      function categorize(text) {
        if (text.includes("#")) {
          return text.split("#")[1].split(" ")[0].toUpperCase();
        }
        if (text.length > 50) return "REFLECTION";
        return "IDEA";
      }

      function addEntry(text) {
        const entry = {
          timestamp: new Date().toLocaleTimeString(),
          content: text,
          category: categorize(text),
          sentiment: analyzeSentiment(text),
        };

        db.unshift(entry); // Add to start
        renderChat(text);
        renderSpreadsheet();
      }

      function renderChat(text) {
        const div = document.createElement("div");
        div.className = "flex justify-end";
        div.innerHTML = `
                <div class="chat-bubble bg-indigo-600 p-4 rounded-2xl rounded-br-none shadow-lg shadow-indigo-900/20">
                    <p class="text-sm leading-relaxed">${text}</p>
                </div>
            `;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
      }

      function renderSpreadsheet() {
        spreadsheetBody.innerHTML = db
          .map(
            (row) => `
                <tr class="hover:bg-slate-800/30 transition-colors">
                    <td class="spreadsheet-cell text-slate-500 font-mono">${row.timestamp}</td>
                    <td class="spreadsheet-cell text-slate-300">${row.content}</td>
                    <td class="spreadsheet-cell">
                        <span class="px-1.5 py-0.5 rounded bg-slate-800 text-indigo-400 border border-indigo-900/50">${row.category}</span>
                    </td>
                    <td class="spreadsheet-cell ${row.sentiment === "Positive" ? "text-emerald-400" : row.sentiment === "Tension" ? "text-rose-400" : "text-slate-500"}">
                        ${row.sentiment}
                    </td>
                </tr>
            `,
          )
          .join("");
      }

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        if (!input.value.trim()) return;
        addEntry(input.value);
        input.value = "";
      });
    </script>
  </body>
</html>
