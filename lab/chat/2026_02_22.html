<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parenting Framework v1.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --father-accent: #3b82f6; /* Logic/Blue */
        --mother-accent: #ec4899; /* Life/Pink */
        --twin-accent: #8b5cf6; /* Action/Purple */
        --telemetry-bg: #020617;
      }

      body {
        background-color: #020617;
        color: #f8fafc;
        font-family: "Inter", sans-serif;
        height: 100vh;
        overflow: hidden;
      }

      .zone-label {
        font-family: "Space Mono", monospace;
        font-size: 0.65rem;
        letter-spacing: 0.2em;
        font-weight: 700;
      }

      /* Zone A: Chat Styling */
      .chat-container::-webkit-scrollbar {
        width: 4px;
      }
      .chat-container::-webkit-scrollbar-thumb {
        background: #1e293b;
        border-radius: 10px;
      }

      /* Zone B: Action Controls */
      .action-btn {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
      }
      .action-btn:active {
        transform: scale(0.95);
      }
      .action-btn::after {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.1),
          transparent
        );
        transition: 0.5s;
      }
      .action-btn:hover::after {
        left: 100%;
      }

      /* Zone C: Telemetry Styling */
      .telemetry-log {
        font-family: "Space Mono", monospace;
        font-size: 0.75rem;
        color: #94a3b8;
        line-height: 1.6;
      }
      .log-entry {
        border-left: 2px solid #1e293b;
        padding-left: 1rem;
        margin-bottom: 1.5rem;
        animation: fadeIn 0.5s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateX(10px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      .pillar-tag {
        background: rgba(59, 130, 246, 0.1);
        border: 1px solid rgba(59, 130, 246, 0.3);
        color: #60a5fa;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 0.6rem;
      }
    </style>
  </head>
  <body class="flex flex-col md:flex-row">
    <!-- ZONE A: THE MIND (Chat/Governance) -->
    <section
      class="w-full md:w-1/3 flex flex-col border-r border-slate-800 bg-slate-900/20"
    >
      <div
        class="p-4 border-b border-slate-800 flex justify-between items-center"
      >
        <span class="zone-label text-slate-500">ZONE A // COMMUNICATION</span>
        <span
          class="text-[10px] bg-blue-500/10 text-blue-400 px-2 py-0.5 rounded border border-blue-500/20"
          >AUDIT ACTIVE</span
        >
      </div>

      <div
        id="chat-flow"
        class="flex-1 overflow-y-auto p-6 space-y-6 chat-container"
      >
        <!-- Initial System Message -->
        <div class="space-y-2">
          <div class="flex gap-2">
            <span class="pillar-tag">FATHER_WITNESS</span>
            <span class="pillar-tag">MOTHER_SEED</span>
          </div>
          <div
            class="bg-slate-800/40 p-4 rounded-2xl rounded-tl-none border border-slate-700/50 text-sm leading-relaxed text-slate-300"
          >
            Awaiting Raw Input. The Governance Protocol is ready to intercept
            and audit against the 4 Pillars.
          </div>
        </div>
      </div>

      <div class="p-4 bg-slate-900/50 border-t border-slate-800">
        <div class="relative">
          <input
            type="text"
            id="raw-input"
            placeholder="Enter Raw Input..."
            class="w-full bg-slate-950 border border-slate-800 rounded-xl py-4 px-5 text-sm focus:outline-none focus:border-blue-500/50 transition-all"
          />
          <button
            id="send-btn"
            class="absolute right-3 top-3 p-2 bg-slate-800 rounded-lg hover:bg-slate-700 transition"
          >
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" />
            </svg>
          </button>
        </div>
      </div>
    </section>

    <!-- ZONE B: THE WILL (Triggers/Consensus) -->
    <section
      class="w-full md:w-1/6 flex flex-col border-r border-slate-800 bg-slate-900/40 p-4 justify-center space-y-8"
    >
      <div class="text-center">
        <span
          class="zone-label text-slate-500 mb-8 block underline decoration-slate-700 underline-offset-8"
          >ZONE B // WILL</span
        >
      </div>

      <div class="space-y-6">
        <button
          id="build-btn"
          disabled
          class="action-btn w-full py-6 rounded-2xl bg-indigo-600/10 border border-indigo-500/30 text-indigo-400 font-bold text-xs uppercase tracking-widest disabled:opacity-30 disabled:cursor-not-allowed"
        >
          Birth Twins<br /><span class="text-[8px] font-normal opacity-60"
            >(Act II: Build)</span
          >
        </button>

        <div class="flex justify-center">
          <div
            id="consensus-light"
            class="w-3 h-3 rounded-full bg-slate-800 shadow-[0_0_10px_rgba(0,0,0,0)] transition-all duration-500"
          ></div>
        </div>

        <button
          id="verify-btn"
          disabled
          class="action-btn w-full py-6 rounded-2xl bg-emerald-600/10 border border-emerald-500/30 text-emerald-400 font-bold text-xs uppercase tracking-widest disabled:opacity-30 disabled:cursor-not-allowed"
        >
          Final Verify<br /><span class="text-[8px] font-normal opacity-60"
            >(Act III: Deploy)</span
          >
        </button>
      </div>

      <div
        class="mt-8 p-3 rounded-xl bg-slate-950/50 border border-slate-800/50"
      >
        <p
          class="text-[9px] text-slate-500 uppercase tracking-tighter leading-tight"
        >
          Status: <span id="protocol-status" class="text-slate-400">Idle</span>
        </p>
      </div>
    </section>

    <!-- ZONE C: THE SOUL (Telemetry/Archive) -->
    <section class="w-full md:w-1/2 flex flex-col bg-slate-950">
      <div
        class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-900/10"
      >
        <span class="zone-label text-slate-500">ZONE C // TELEMETRIC LOG</span>
        <span class="text-[9px] text-slate-600 font-mono tracking-tighter"
          >L0_ROOT_OF_TRUST_v1.0</span
        >
      </div>

      <div
        id="telemetry-output"
        class="flex-1 overflow-y-auto p-8 telemetry-log custom-scrollbar"
      >
        <!-- Immutable logs appear here -->
        <div
          class="opacity-20 flex items-center justify-center h-full italic text-xs"
        >
          No telemetry recorded in current session.
        </div>
      </div>
    </section>

    <script>
      const chatFlow = document.getElementById("chat-flow");
      const rawInput = document.getElementById("raw-input");
      const sendBtn = document.getElementById("send-btn");
      const buildBtn = document.getElementById("build-btn");
      const verifyBtn = document.getElementById("verify-btn");
      const consensusLight = document.getElementById("consensus-light");
      const telemetryOutput = document.getElementById("telemetry-output");
      const statusEl = document.getElementById("protocol-status");

      let currentInput = "";
      let currentAudit = null;

      function addChatMessage(role, text, tags = []) {
        const div = document.createElement("div");
        div.className = "space-y-2";
        div.innerHTML = `
                <div class="flex gap-2">
                    ${tags.map((t) => `<span class="pillar-tag">${t}</span>`).join("")}
                </div>
                <div class="${role === "USER" ? "bg-blue-600/10 border-blue-500/20" : "bg-slate-800/40 border-slate-700/50"} p-4 rounded-2xl ${role === "USER" ? "rounded-tr-none" : "rounded-tl-none"} border text-sm leading-relaxed text-slate-300">
                    ${text}
                </div>
            `;
        chatFlow.appendChild(div);
        chatFlow.scrollTop = chatFlow.scrollHeight;
      }

      function triggerAudit(input) {
        currentInput = input;
        statusEl.innerText = "Act I: Auditing...";

        // Artificial delay to simulate Father/Mother Processing
        setTimeout(() => {
          addChatMessage("USER", input, ["RAW_INPUT"]);

          const auditText = `Father Audit Complete. Pillar: Importance (High). Origin: User Request. Missing Variable: Implementation Details. Mother Seed Defined: Fractal_UI_Generator. Readiness for Act II established.`;

          addChatMessage("SYSTEM", auditText, ["FATHER_AUDIT", "MOTHER_SEED"]);
          buildBtn.disabled = false;
          statusEl.innerText = "Awaiting Act II: Build";
        }, 800);
      }

      buildBtn.onclick = () => {
        statusEl.innerText = "Act II: Deploying Twins...";
        buildBtn.disabled = true;

        setTimeout(() => {
          const twinText = `Female Builder: Architecture initialized. Male Validator: Stress test passed. Consensus reached. Energy flow directed toward Deposition.`;
          addChatMessage("SYSTEM", twinText, [
            "TWIN_BUILDER",
            "TWIN_VALIDATOR",
            "CONSENSUS",
          ]);

          consensusLight.classList.replace("bg-slate-800", "bg-indigo-500");
          consensusLight.classList.add(
            "shadow-[0_0_15px_rgba(99,102,241,0.6)]",
          );

          verifyBtn.disabled = false;
          statusEl.innerText = "Awaiting Act III: Verify";
        }, 1000);
      };

      verifyBtn.onclick = () => {
        statusEl.innerText = "Act III: Logging...";
        verifyBtn.disabled = true;

        setTimeout(() => {
          if (telemetryOutput.innerHTML.includes("italic"))
            telemetryOutput.innerHTML = "";

          const logEntry = document.createElement("div");
          logEntry.className = "log-entry";
          logEntry.innerHTML = `
                    <div class="text-[10px] text-emerald-500 mb-2 font-bold">[ENTRY_STAMP_${new Date().getTime().toString().slice(-6)}]</div>
                    <div class="text-white mb-1 uppercase tracking-widest text-[10px]">SUCCESS_METRIC: System Maturation</div>
                    <div>Toddler status: SMILING.</div>
                    <div class="mt-2 text-indigo-400">REFACTORED_LEGACY: Fear of Fragmented Design deleted.</div>
                    <div class="mt-2 border-t border-slate-800 pt-2 text-[10px]">NEXT_STEP: Fractal integration with Node 01.</div>
                `;
          telemetryOutput.prepend(logEntry);

          consensusLight.classList.replace("bg-indigo-500", "bg-slate-800");
          consensusLight.classList.remove(
            "shadow-[0_0_15px_rgba(99,102,241,0.6)]",
          );

          statusEl.innerText = "Protocol Complete / Idle";
          addChatMessage(
            "SYSTEM",
            "Cycle complete. Outcome archived to Zone C.",
            ["SYSTEM_IDLE"],
          );
        }, 800);
      };

      sendBtn.onclick = () => {
        if (!rawInput.value.trim()) return;
        triggerAudit(rawInput.value);
        rawInput.value = "";
      };

      rawInput.onkeydown = (e) => {
        if (e.key === "Enter") sendBtn.onclick();
      };
    </script>
  </body>
</html>
